---
name: Pre-release
on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  pre-release:
    name: Pre-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Build artifacts via Makefile
        run: |
          mkdir -p dist
          CLEAN_REF=$(echo "$GITHUB_REF_NAME" | sed 's/[^a-zA-Z0-9]//g')
          VERSION="$CLEAN_REF-${GITHUB_SHA:0:7}"
          make artifact VERSION="$VERSION"
          ls -la dist
      - name: Create or update a draft pre-release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          name: "${{ github.ref_name }}"
          draft: true
          prerelease: true
          files: |
            dist/*.zip
            dist/*.md5
